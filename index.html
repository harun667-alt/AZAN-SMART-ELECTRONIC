<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZAN SMART ELECTRONIC - Admin</title>
<style>
body{font-family:'SolaimanLipi',Arial,sans-serif;background:#f5f5f5;padding:20px}
.header{text-align:center;padding:30px 0}
.logo-img{width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2)}
h1{font-size:32px;color:#222}
.box{background:white;padding:30px;border-radius:15px;max-width:400px;margin:50px auto;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
input{width:100%;padding:12px;margin:10px 0;border:2px solid #ddd;border-radius:8px;font-size:16px}
.btn{background:#1877f2;color:white;padding:12px 30px;border-radius:8px;border:none;font-size:16px;cursor:pointer;font-weight:bold;width:100%}
.btn:hover{opacity:0.9}
#adminPanel{display:none}
</style>
</head>
<body>
<div class="header">
<img src="logo.png" alt="Logo" class="logo-img">
<h1>AZAN SMART ELECTRONIC</h1>
</div>
<img src="logo.jpeg" alt="Logo" class="logo-img">
<!-- Admin Login Box -->
<div class="box" id="loginBox">
<h2>👑 Admin Login</h2>
<input type="text" id="user" placeholder="Username লিখো">
<input type="password" id="pass" placeholder="Password লিখো">
<button class="btn" onclick="login()">Login করো</button>
<p style="margin-top:15px;font-size:13px;color:#666">Default: admin / 1234</p>
</div>

<!-- Admin Panel - লগইনের পর দেখাবে -->
<div id="adminPanel">
<div class="box">
<h2>✅ লগইন সফল!</h2>
<p>স্বাগতম Admin ভাই</p>
<p>এখানে পরে প্রোডাক্ট অ্যাড/ডিলিট করার অপশন আসবে</p>
<button class="btn" onclick="logout()">Logout</button>
</div>
</div>

<script>
function login(){
  let user = document.getElementById('user').value;
  let pass = document.getElementById('pass').value;
  
  // এইটা তোমার Admin আইডি। পরে চেঞ্জ করতে পারবা
  if(user == "admin" && pass == "1234"){
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('adminPanel').style.display = "block";
    alert("লগইন সফল ভাই!");
  } else {
    alert("ভুল Username বা Password! admin / 1234 ট্রাই করো");
  }
}

function logout(){
  document.getElementById('adminPanel').style.display = "none";
  document.getElementById('loginBox').style.display = "block";
  document.getElementById('user').value = "";
  document.getElementById('pass').value = "";
}
</script>
</body>
</html>
