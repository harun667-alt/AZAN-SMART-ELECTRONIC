<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - AZAN SMART ELECTRONIC</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Hind Siliguri',sans-serif}</style>
</head>
<body class="bg-gray-100">

<div class="flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Admin Login</h2>
    
    <div id="loginBox">
      <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দাও" class="w-full px-4 py-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-green-500">
      <button onclick="login()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">লগিন</button>
      <p id="errorMsg" class="text-red-500 text-sm mt-2 hidden">পাসওয়ার্ড ভুল!</p>
    </div>

    <div id="adminPanel" class="hidden">
      <h3 class="text-xl font-bold mb-4">আজানের সময় সেট করো</h3>
      <div class="space-y-3">
        <div><label class="block mb-1">ফজর:</label><input type="time" id="fajr" class="w-full border px-3 py-2 rounded"></div>
        <div><label class="block mb-1">যোহর:</label><input type="time" id="dhuhr" class="w-full border px-3 py-2 rounded"></div>
        <div><label class="block mb-1">আসর:</label><input type="time" id="asr" class="w-full border px-3 py-2 rounded"></div>
        <div><label class="block mb-1">মাগরিব:</label><input type="time" id="maghrib" class="w-full border px-3 py-2 rounded"></div>
        <div><label class="block mb-1">ইশা:</label><input type="time" id="isha" class="w-full border px-3 py-2 rounded"></div>
      </div>
      <button onclick="saveTimes()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mt-6 hover:bg-blue-700">সেভ করো</button>
      <p id="successMsg" class="text-green-600 text-sm mt-2 hidden">সেভ হয়েছে!</p>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "azan123";

function login() {
  const pass = document.getElementById('adminPass').value;
  if(pass === ADMIN_PASSWORD) {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadTimes();
  } else {
    document.getElementById('errorMsg').classList.remove('hidden');
  }
}

function loadTimes() {
  const times = JSON.parse(localStorage.getItem('prayerTimes') || '{}');
  document.getElementById('fajr').value = times.fajr || '';
  document.getElementById('dhuhr').value = times.dhuhr || '';
  document.getElementById('asr').value = times.asr || '';
  document.getElementById('maghrib').value = times.maghrib || '';
  document.getElementById('isha').value = times.isha || '';
}

function saveTimes() {
  const times = {
    fajr: document.getElementById('fajr').value,
    dhuhr: document.getElementById('dhuhr').value,
    asr: document.getElementById('asr').value,
    maghrib: document.getElementById('maghrib').value,
    isha: document.getElementById('isha').value
  };
  localStorage.setItem('prayerTimes', JSON.stringify(times));
  document.getElementById('successMsg').classList.remove('hidden');
  setTimeout(() => document.getElementById('successMsg').classList.add('hidden'), 2000);
}
</script>

</body>
</html>
